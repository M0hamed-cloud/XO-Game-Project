<!DOCTYPE html>
<html lang="en">        

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic tac toe</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
<div id="gameContainer">
    <h1>Tic Tac Toe</h1>
    
<div id="modeSelector">
  <button id="pvpBtn" class="modeBtn active">2 Players</button>
  <button id="aiBtn" class="modeBtn">vs AI</button>
</div>

    <div id="status"></div>


    <div class="score">
    <div>X score:<span id="xscore">0 </span></div>
    <div>O score:<span id="oscore">0 </span></div>
    </div>

    
    </div>
    

<div id="cellContainer">
<div class="cell" data-cell-index="0"></div>
<div class="cell" data-cell-index="1"></div>        
<div class="cell" data-cell-index="2"></div>
<div class="cell" data-cell-index="3"></div>
<div class="cell" data-cell-index="4"></div>
<div class="cell" data-cell-index="5"></div>
<div class="cell" data-cell-index="6"></div>
<div class="cell" data-cell-index="7"></div>
<div class="cell" data-cell-index="8"></div>
</div>

<div id="buttonContainer">
    <button id="restart">Restart Game</button>
    <button id="reset">Reset Score</button>
</div>


<script src="AI.js" defer></script>
</body> 
</html>
